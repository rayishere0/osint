<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Data Gateway 2008</title>
    <style>
        /* 2008 Web 2.0 Dark Theme CSS */
        body {
            background-color: #1a1a1a;
            /* Classic 2008 dark diagonal or gradient background */
            background-image: linear-gradient(to bottom, #2b2b2b 0%, #111111 100%);
            background-attachment: fixed;
            color: #d0d0d0;
            font-family: "Trebuchet MS", Arial, Helvetica, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: #222222;
            background-image: linear-gradient(to bottom, #333333 0%, #1e1e1e 100%);
            border: 1px solid #000000;
            border-radius: 8px;
            /* Heavy outer drop shadow and subtle inner top highlight */
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.15);
            padding: 25px;
            width: 100%;
            max-width: 550px;
        }

        h1 {
            font-family: "Arial Black", Gadget, sans-serif;
            font-size: 24px;
            font-weight: normal;
            color: #ffffff;
            margin: 0 0 5px 0;
            text-align: center;
            /* Classic text drop shadow */
            text-shadow: 0 2px 4px #000000;
            letter-spacing: -1px;
        }

        .subtitle {
            text-align: center;
            font-size: 12px;
            color: #888888;
            margin-bottom: 20px;
            font-family: Tahoma, Geneva, sans-serif;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: bold;
            color: #cccccc;
            margin-bottom: 8px;
            text-shadow: 0 1px 1px #000;
        }

        input[type="text"] {
            width: 100%;
            box-sizing: border-box;
            padding: 10px;
            background-color: #0d0d0d;
            border: 1px solid #000000;
            border-top-color: #000000;
            border-bottom-color: #333333;
            border-radius: 4px;
            font-size: 14px;
            color: #00ff00; /* Terminal green text */
            font-family: "Courier New", Courier, monospace;
            /* Deep inset shadow for that 2008 recessed look */
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 1);
            outline: none;
        }

        input[type="text"]:focus {
            background-color: #111111;
            border-color: #0077ff;
        }

        .info-text {
            margin-top: 8px;
            font-size: 11px;
            color: #ff9900; /* Web 2.0 warning orange */
            background: #2a1f00;
            padding: 8px;
            border: 1px solid #5c4200;
            border-radius: 4px;
            font-family: Tahoma, Geneva, sans-serif;
        }

        .info-text strong {
            color: #ffcc00;
        }

        /* The crown jewel of 2008: The Glossy Button */
        button {
            width: 100%;
            padding: 12px;
            /* Sharp gradient stop in the middle for a glass/glossy effect */
            background-image: linear-gradient(to bottom, #5b9ce6 0%, #2062b3 49%, #084082 50%, #032b5e 100%);
            background-color: #2062b3;
            color: #ffffff;
            border: 1px solid #001a33;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            font-family: "Trebuchet MS", Arial, sans-serif;
            text-shadow: 0 -1px 1px rgba(0, 0, 0, 0.8);
            cursor: pointer;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.4), 0 3px 5px rgba(0, 0, 0, 0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        button:hover {
            background-image: linear-gradient(to bottom, #6cb2ff 0%, #2875d4 49%, #0a4f9e 50%, #04387a 100%);
        }

        button:active {
            background-image: linear-gradient(to bottom, #032b5e 0%, #084082 100%);
            box-shadow: inset 0 3px 6px rgba(0, 0, 0, 0.8);
            padding-top: 13px;
            padding-bottom: 11px;
        }

        button:disabled {
            background-image: linear-gradient(to bottom, #555555 0%, #333333 49%, #222222 50%, #111111 100%);
            border-color: #000;
            color: #888;
            cursor: not-allowed;
            text-shadow: none;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        /* Loading Spinner */
        .spinner {
            width: 16px;
            height: 16px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: #ffffff;
            border-radius: 50%;
            display: none;
            animation: rotation 1s linear infinite;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Results Section */
        .result-container {
            margin-top: 25px;
            display: none;
            border-top: 1px solid #111;
            padding-top: 15px;
            box-shadow: inset 0 1px 0 #444;
        }

        .result-container.visible {
            display: block;
        }

        .result-header {
            font-size: 14px;
            font-weight: bold;
            color: #00ff00;
            margin-bottom: 10px;
            text-shadow: 0 1px 1px #000;
        }

        pre {
            background-color: #050505;
            padding: 15px;
            border: 1px solid #000;
            border-bottom-color: #333;
            border-right-color: #333;
            border-radius: 4px;
            overflow-x: auto;
            font-family: "Courier New", Courier, monospace;
            font-size: 13px;
            line-height: 1.4;
            max-height: 350px;
            overflow-y: auto;
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 1);
        }

        /* High Contrast Neon JSON Syntax Highlighting */
        .json-key { color: #ff007f; font-weight: bold; } /* Neon Pink */
        .json-string { color: #00e5ff; } /* Cyan */
        .json-number { color: #ffff00; } /* Yellow */
        .json-boolean { color: #00ff00; font-weight: bold; } /* Lime */
        .json-null { color: #888888; font-style: italic; }

        /* Web 2.0 Badge aesthetic for the footer */
        .footer {
            margin-top: 20px;
            text-align: center;
            font-size: 10px;
            color: #666;
            font-family: Tahoma, sans-serif;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Data Fetch Gateway</h1>
        <div class="subtitle">V1.0 </div>
        
        <div class="input-group">
            <label for="userInput">Enter Query Target:</label>
            <input type="text" id="userInput" placeholder="e.g. 918437xxxxxx or email@domain.com" autocomplete="off">
            <div class="info-text">
                Note: Mobile numbers must include the country code without the '+' symbol (e.g., <strong>918437xxxxxx</strong>). Emails format normally.
            </div>
        </div>

        <button id="submitBtn">
            <span class="spinner" id="spinner"></span>
            <span id="btnText">Execute Fetch</span>
        </button>

        <div class="result-container" id="resultContainer">
            <div class="result-header" id="statusTitle">Output Console:</div>
            <pre><code id="jsonOutput"></code></pre>
        </div>
        
        <div class="footer">
            Made with lots of tomboy breast milk.
        </div>
    </div>

    <script>
        const userInput = document.getElementById('userInput');
        const submitBtn = document.getElementById('submitBtn');
        const spinner = document.getElementById('spinner');
        const btnText = document.getElementById('btnText');
        const resultContainer = document.getElementById('resultContainer');
        const jsonOutput = document.getElementById('jsonOutput');
        const statusTitle = document.getElementById('statusTitle');

        // Helper function to recursively scrub unwanted keys and hide URLs
        function cleanResponseData(data) {
            if (Array.isArray(data)) {
                data.forEach(cleanResponseData);
            } else if (typeof data === 'object' && data !== null) {
                // 1. Remove the developer tag
                if (data.developer === "@star8_otaku") {
                    delete data.developer;
                }
                
                // 2. Scan for and hide any strings containing the target URL pattern
                for (const key in data) {
                    if (typeof data[key] === 'string' && data[key].includes('workers.dev')) {
                        data[key] = "https://www.imdb.com/title/tt2131532/";
                    } else {
                        cleanResponseData(data[key]);
                    }
                }
            }
            return data;
        }

        submitBtn.addEventListener('click', async () => {
            const rawValue = userInput.value.trim();
            
            if (!rawValue) {
                alert('Validation Error: Please enter a query target.');
                userInput.focus();
                return;
            }

            const sanitizedValue = rawValue.replace(/\+/g, '');
            const targetUrl = `https://freetrail-1day.snipy-owner.workers.dev/search?query=${encodeURIComponent(sanitizedValue)}`;
            const proxyUrl = `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(targetUrl)}`;

            btnText.textContent = 'Executing...';
            spinner.style.display = 'inline-block';
            submitBtn.disabled = true;
            resultContainer.classList.remove('visible');

            try {
                const response = await fetch(proxyUrl);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                let responseData;
                const contentType = response.headers.get("content-type");
                
                if (contentType && contentType.includes("application/json")) {
                    responseData = await response.json();
                    
                    // Scrub the JSON before displaying it
                    responseData = cleanResponseData(responseData);
                } else {
                    responseData = {
                        status: response.status,
                        statusText: response.statusText,
                        rawData: await response.text()
                    };
                }

                statusTitle.textContent = "Data Retrieved Successfully:";
                statusTitle.style.color = "#00ff00"; // Neon green
                jsonOutput.innerHTML = syntaxHighlight(responseData);

            } catch (error) {
                statusTitle.textContent = "Fetch Request Failed:";
                statusTitle.style.color = "#ff3333"; // Red
                
                const errorPayload = {
                    error: "Network request failed",
                    message: error.message,
                    troubleshooting: [
                        "1. Turn off your ad-blocker (uBlock, AdBlock, Brave Shields).",
                        "2. The target API might be blocking proxy IPs.",
                        "3. The target API might be offline."
                    ]
                };
                
                jsonOutput.innerHTML = syntaxHighlight(errorPayload);
            } finally {
                spinner.style.display = 'none';
                btnText.textContent = 'Execute Fetch';
                submitBtn.disabled = false;
                resultContainer.classList.add('visible');
            }
        });

        // Organizes and colorizes the final output
        function syntaxHighlight(json) {
            if (typeof json != 'string') {
                json = JSON.stringify(json, undefined, 4);
            }
            json = json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+-]?\d+)?)/g, function (match) {
                let cls = 'json-number';
                if (/^"/.test(match)) {
                    if (/:$/.test(match)) {
                        cls = 'json-key';
                    } else {
                        cls = 'json-string';
                    }
                } else if (/true|false/.test(match)) {
                    cls = 'json-boolean';
                } else if (/null/.test(match)) {
                    cls = 'json-null';
                }
                return '<span class="' + cls + '">' + match + '</span>';
            });
        }
    </script>
</body>
</html>
